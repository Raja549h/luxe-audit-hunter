<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0A0C10" />
    <meta name="description" content="Luxe Audit Hunter — 5-star luxury hotel mystery guest assignments in Pune, India" />
    <script src="data.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,600&family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <title>Luxe Audit Hunter — Pune 5★ Mystery Guest Assignments</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#0A0C10',
                        'dark-card': '#12141A',
                        'dark-border': '#2A2D35',
                        gold: '#D4AF37',
                        'gold-light': '#E5C76B'
                    },
                    fontFamily: {
                        'display': ['Playfair Display', 'serif'],
                        'body': ['Manrope', 'sans-serif'],
                        'mono': ['JetBrains Mono', 'monospace']
                    }
                }
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Manrope', sans-serif; 
            background: #0A0C10; 
            color: #E8E6E1;
            min-height: 100vh;
        }
        .font-display { font-family: 'Playfair Display', serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #12141A; }
        ::-webkit-scrollbar-thumb { background: #2A2D35; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #3A3D45; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-pulse { animation: pulse 2s infinite; }
        
        @keyframes live-dot {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.7; }
        }
        .live-dot { animation: live-dot 1.5s infinite; }
        
        .glass-card {
            background: rgba(18, 20, 26, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(42, 45, 53, 0.6);
        }
        
        .bg-gradient-radial {
            background: radial-gradient(ellipse at top, #1a1d26 0%, #0A0C10 50%);
        }
        
        .btn-apply {
            background: linear-gradient(135deg, #D4AF37 0%, #E5C76B 100%);
            color: #0A0C10;
            font-weight: 700;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .btn-apply:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
        }
        
        .btn-daily {
            background: linear-gradient(135deg, #2D6A4F 0%, #236b42 100%);
            color: white;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-daily:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(45, 106, 79, 0.5);
        }
        
        .fresh-badge {
            background: linear-gradient(135deg, #10B981 0%, #059669 100%);
            color: white;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            text-transform: uppercase;
        }
        
        .expiring-soon {
            border-left: 4px solid #EF4444;
        }
        
        .high-value {
            border-left: 4px solid #D4AF37;
        }
        
        .urgent-badge {
            background: #EF4444;
            color: white;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            text-transform: uppercase;
            animation: pulse 1s infinite;
        }
    </style>
</head>
<body class="bg-gradient-radial min-h-screen">
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        const platformUrls = {
            'FloorWalk': 'https://floorwalk.in/Mystery_Shopping_Shopper.html',
            'Coyle Hospitality': 'https://coylehospitality.com/evaluators/',
            'Shaw Hotels & Consultancy': 'https://shawhotels.com/shopper-sign-up/',
            'Bare International': 'https://www.bareinternational.in/evaluators/',
            'HS Brands': 'https://hsbrandsasia.com/new-shopper-signup/',
            'RedQuanta': 'https://www.redquanta.com/',
            'Tophawks': 'https://tophawks.com/apply-as-mystery-shopper-top-hawks/',
            'Ipsos iShopForIpsos': 'https://ishopforipsos.com/'
        };

        const DEFAULT_REFRESHED = "2026-05-28T15:00:00+05:30";

        function getClosesInfo(deadline) {
            const now = new Date();
            const end = new Date(deadline);
            const diffMs = end - now;
            const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
            const diffHours = Math.floor(diffMs / (1000 * 60 * 60));
            const diffMinutes = Math.floor(diffMs / (1000 * 60));
            return { diffMs, diffDays, diffHours, diffMinutes, expired: diffMs <= 0 };
        }

        function getUrgency(closesDays) {
            if (closesDays <= 1) return 'URGENT';
            if (closesDays <= 3) return 'High';
            return 'Medium';
        }

        function formatCountdown(diffMs) {
            if (diffMs <= 0) return 'CLOSED';
            const totalSec = Math.floor(diffMs / 1000);
            const d = Math.floor(totalSec / 86400);
            const h = Math.floor((totalSec % 86400) / 3600);
            const m = Math.floor((totalSec % 3600) / 60);
            if (d > 0) return `${d}d ${h}h`;
            if (h > 0) return `${h}h ${m}m`;
            return `${m}m`;
        }

        function formatLastUpdated(isoStr) {
            if (!isoStr) return 'unknown';
            const d = new Date(isoStr);
            const now = new Date();
            const diffMin = Math.floor((now - d) / 60000);
            if (diffMin < 1) return 'just now';
            if (diffMin < 60) return `${diffMin}m ago`;
            const diffH = Math.floor(diffMin / 60);
            if (diffH < 24) return `${diffH}h ago`;
            return d.toLocaleDateString();
        }

        function formatDeadline(deadline) {
            const d = new Date(deadline);
            const now = new Date();
            const diffDays = Math.floor((d - now) / (1000 * 60 * 60 * 24));
            if (diffDays < 0) return 'CLOSED';
            if (diffDays === 0) return 'Today';
            if (diffDays === 1) return 'Tomorrow';
            if (diffDays <= 7) return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
            return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        }

        function enhanceOpportunities(opps, now) {
            return opps.map(o => {
                const info = getClosesInfo(o.deadline);
                const closesDays = info.expired ? -1 : info.diffDays;
                const urgency = getUrgency(closesDays);
                const lastDate = formatDeadline(o.deadline);
                return { ...o, closesDays, urgency, lastDate, _closesInfo: info };
            }).filter(o => !o._closesInfo.expired);
        }

        function Header({ opportunities, lastRefreshed, activeCount, totalValue }) {
            const totalReimburse = opportunities.reduce((sum, a) => {
                const value = parseFloat(a.reimburse.replace(/[₹,]/g, ''));
                return sum + value;
            }, 0);
            const formattedTotal = totalReimburse >= 100000 
                ? '₹' + (totalReimburse / 100000).toFixed(1) + 'L'
                : '₹' + (totalReimburse / 1000).toFixed(0) + 'K';

            return (
                <header className="border-b border-dark-border pb-6 mb-8">
                    <div className="flex flex-col lg:flex-row lg:justify-between lg:items-start gap-4">
                        <div>
                            <div className="flex items-center gap-3 mb-2">
                                <h1 className="font-display text-3xl md:text-4xl font-semibold tracking-tight text-white">
                                    Luxe Audit Hunter
                                </h1>
                                <div className="flex items-center gap-1 bg-[#10B981] px-3 py-1 rounded-full">
                                    <span className="w-2 h-2 bg-white rounded-full live-dot"></span>
                                    <span className="text-white text-xs font-semibold">PUNE</span>
                                </div>
                            </div>
                            <div className="flex gap-2 mt-3">
                                <span className="bg-gold text-dark text-xs font-semibold px-3 py-1 rounded-full">
                                    5★ Mystery Guest
                                </span>
                                <span className="bg-[#2A2D35] text-[#E8E6E1] text-xs font-medium px-3 py-1 rounded-full">
                                    Pune, India
                                </span>
                            </div>
                            <p className="text-[#8B8B8B] text-sm mt-2">
                                {activeCount} active in Pune • Refresh: {formatLastUpdated(lastRefreshed)}
                            </p>
                        </div>
                        <div className="lg:text-right">
                            <h2 className="font-display text-2xl md:text-3xl font-medium text-white leading-tight">
                                Get paid to stay<br />at 5-star hotels<br />in Pune.
                            </h2>
                            <p className="text-[#10B981] font-mono text-lg font-bold mt-2">
                                {formattedTotal} in active gigs
                            </p>
                            <p className="text-[#8B8B8B] text-xs mt-1 max-w-md lg:ml-auto">
                                Exclusive mystery guest gigs at Hyatt, Marriott, Taj, Ritz-Carlton, Hilton & more in Pune.
                            </p>
                        </div>
                    </div>
                </header>
            );
        }

        function StatsRow({ opportunities }) {
            const totalReimburse = opportunities.reduce((sum, a) => {
                const value = parseFloat(a.reimburse.replace(/[₹,]/g, ''));
                return sum + value;
            }, 0);
            
            const formattedTotal = totalReimburse >= 100000 
                ? '₹' + (totalReimburse / 100000).toFixed(1) + 'L'
                : '₹' + (totalReimburse / 1000).toFixed(0) + 'K';
            
            const highUrgency = opportunities.filter(a => a.urgency === 'URGENT' || a.urgency === 'High').length;
            const expiringToday = opportunities.filter(a => a.closesDays === 0).length;
            const overnightGigs = opportunities.filter(a => a.tags && a.tags.includes('overnight')).length;

            return (
                <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                    <div className="glass-card rounded-2xl p-4 text-center">
                        <span className="font-mono text-2xl md:text-3xl font-bold text-white block">{opportunities.length}</span>
                        <span className="text-[#8B8B8B] text-sm">Active Gigs</span>
                    </div>
                    <div className="glass-card rounded-2xl p-4 text-center">
                        <span className="font-mono text-2xl md:text-3xl font-bold text-gold block">{formattedTotal}</span>
                        <span className="text-[#8B8B8B] text-sm">Total Value</span>
                    </div>
                    <div className="glass-card rounded-2xl p-4 text-center">
                        <span className="font-mono text-2xl md:text-3xl font-bold text-red-500 block">{highUrgency}</span>
                        <span className="text-[#8B8B8B] text-sm">High Priority</span>
                    </div>
                    <div className="glass-card rounded-2xl p-4 text-center">
                        <span className="font-mono text-2xl md:text-3xl font-bold text-[#10B981] block">{overnightGigs}</span>
                        <span className="text-[#8B8B8B] text-sm">Overnight Stays</span>
                    </div>
                </div>
            );
        }

        function AssignmentCard({ assignment, index, onApply }) {
            const [now, setNow] = useState(Date.now());
            
            useEffect(() => {
                const timer = setInterval(() => setNow(Date.now()), 10000);
                return () => clearInterval(timer);
            }, []);

            const info = getClosesInfo(assignment.deadline);
            const isUrgent = info.diffDays <= 1 && !info.expired;
            const isHigh = assignment.urgency === 'High' || assignment.urgency === 'URGENT';
            const isOvernight = assignment.tags && assignment.tags.includes('overnight');
            const expiresSoon = info.diffMs > 0 && info.diffMs < 7200000;

            return (
                <div 
                    className={`glass-card rounded-xl p-6 hover:border-gold/30 transition-all duration-300 animate-fade-in ${info.diffDays <= 1 && !info.expired ? 'expiring-soon' : isHigh ? 'high-value' : ''}`}
                    style={{ animationDelay: `${index * 80}ms` }}
                >
                    <div className="flex justify-between items-start mb-4 flex-wrap gap-2">
                        <div className="flex items-center gap-2 flex-wrap">
                            {info.expired && <span className="bg-[#6B7280] text-white text-xs font-bold px-3 py-1 rounded-full">CLOSED</span>}
                            {isUrgent && <span className="urgent-badge">URGENT</span>}
                            {isHigh && !isUrgent && <span className="bg-[#FCE9DD] text-[#B45F2B] text-xs font-bold px-3 py-1 rounded-full">HIGH</span>}
                            {isOvernight && <span className="bg-[#10B981]/20 text-[#10B981] text-xs font-semibold px-3 py-1 rounded-full">OVERNIGHT</span>}
                        </div>
                        <span className="text-[#8B8B8B] text-xs bg-[#1E2028] px-3 py-1 rounded-full">{assignment.platform}</span>
                    </div>
                    
                    <h3 className="font-display text-xl font-bold text-white mb-2">
                        {assignment.hotel}
                    </h3>
                    <p className="text-[#8B8B8B] text-sm mb-4">{assignment.chain}</p>
                    
                    <div className="flex items-center gap-2 mb-4">
                        <div className="font-mono text-3xl font-bold text-[#2D6A4F]">
                            {assignment.total}
                        </div>
                        <div className="text-sm text-[#8B8B8B]">total value</div>
                    </div>
                    
                    <div className="space-y-2 text-sm text-[#B8B6B2] mb-4">
                        <p className="flex items-center gap-2">📍 {assignment.location}</p>
                        <p className="flex items-center gap-2">📋 {assignment.eval}</p>
                        <p className="flex items-center gap-2">⏱️ {assignment.duration}</p>
                    </div>
                    
                    <div className="flex flex-wrap gap-2 mb-4">
                        {assignment.tags && assignment.tags.map((tag, i) => (
                            <span key={i} className="bg-[#1E2028] text-[#8B8B8B] text-xs px-3 py-1 rounded-lg">
                                {tag}
                            </span>
                        ))}
                    </div>
                    
                    <div className="flex gap-4 mb-4 text-base font-semibold p-3 bg-dark/50 rounded-lg border border-dark-border">
                        <span className="text-white">Pay: <span className="text-emerald-400 font-bold text-lg">{assignment.pay}</span></span>
                        <span className="text-gold">Reimburse: <span className="text-gold-light font-bold text-lg">{assignment.reimburse}</span></span>
                    </div>
                    
                    <div className="pt-4 border-t border-dark-border">
                        <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
                            <div className="flex flex-col gap-1">
                                <div className={`flex items-center gap-2 ${info.expired ? 'text-gray-500' : isUrgent ? 'text-red-400' : 'text-[#BC6C25]'}`}>
                                    <span className="text-lg">{info.expired ? '🚫' : isUrgent ? '🔥' : '📅'}</span>
                                    <span className="font-semibold">Apply by: {formatDeadline(assignment.deadline)}</span>
                                </div>
                                {!info.expired && (
                                    <span className={`font-mono text-xs ${expiresSoon ? 'text-red-400 animate-pulse' : 'text-[#6B7280]'}`}>
                                        closes in {formatCountdown(info.diffMs)}
                                    </span>
                                )}
                            </div>
                            <button 
                                type="button"
                                onClick={() => onApply(assignment)}
                                className="btn-apply"
                            >
                                ⚡ Apply Now
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        function AssignmentsList({ opportunities, onApply }) {
            const sorted = [...opportunities].sort((a, b) => {
                const aUrgent = a.urgency === 'URGENT' || a.urgency === 'High';
                const bUrgent = b.urgency === 'URGENT' || b.urgency === 'High';
                if (aUrgent && !bUrgent) return -1;
                if (!aUrgent && bUrgent) return 1;
                return a.closesDays - b.closesDays;
            });

            const urgentCount = opportunities.filter(a => a.urgency === 'URGENT').length;
            const highCount = opportunities.filter(a => a.urgency === 'High').length;
            const overnightCount = opportunities.filter(a => a.tags && a.tags.includes('overnight')).length;

            return (
                <section>
                    <div className="flex flex-wrap justify-between items-baseline mb-6 gap-2">
                        <h3 className="font-display text-2xl font-semibold text-white">
                            Active Assignments in Pune
                        </h3>
                        <span className="text-[#8B8B8B] text-sm">{opportunities.length} opportunities</span>
                    </div>
                    
                    <div className="flex flex-wrap gap-3 text-sm bg-[#12141A] rounded-full px-5 py-3 mb-6">
                        <span className="text-red-400 font-semibold">Urgent: {urgentCount}</span>
                        <span className="text-[#8B8B8B]">|</span>
                        <span className="text-[#E5C76B]">High: {highCount}</span>
                        <span className="text-[#8B8B8B]">|</span>
                        <span className="text-[#10B981]">Overnight: {overnightCount}</span>
                        <span className="text-[#8B8B8B]">|</span>
                        <span className="text-[#8B8B8B]">Total: {opportunities.reduce((s, a) => s + parseFloat(a.reimburse.replace(/[₹,]/g, '')), 0) >= 100000
                            ? '₹' + (opportunities.reduce((s, a) => s + parseFloat(a.reimburse.replace(/[₹,]/g, '')), 0) / 100000).toFixed(1) + 'L'
                            : '₹' + (opportunities.reduce((s, a) => s + parseFloat(a.reimburse.replace(/[₹,]/g, '')), 0) / 1000).toFixed(0) + 'K'}</span>
                    </div>
                    
                    {opportunities.length === 0 ? (
                        <div className="glass-card rounded-2xl p-12 text-center">
                            <div className="text-5xl mb-4">🔍</div>
                            <h3 className="font-display text-2xl font-semibold text-white mb-2">No active offers right now</h3>
                            <p className="text-[#8B8B8B]">New Pune assignments appear here as platforms publish them. Check back soon.</p>
                        </div>
                    ) : (
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                            {sorted.map((a, i) => (
                                <AssignmentCard key={a.id} assignment={a} index={i} onApply={onApply} />
                            ))}
                        </div>
                    )}
                </section>
            );
        }

        function Sidebar({ opportunities, onApply, lastRefreshed }) {
            const topPicks = [...opportunities]
                .filter(a => a.urgency === 'URGENT' || a.urgency === 'High')
                .sort((a, b) => a.closesDays - b.closesDays)
                .slice(0, 5);

            return (
                <aside className="space-y-6">
                    <div className="glass-card rounded-2xl p-5">
                        <div className="flex items-center gap-2 mb-4">
                            <span className="text-2xl">⭐</span>
                            <h4 className="font-display text-lg font-semibold text-white">Top Picks - Apply Now</h4>
                        </div>
                        <p className="text-[#8B8B8B] text-xs mb-4">Highest paying, most urgent opportunities</p>
                        
                        {topPicks.length === 0 ? (
                            <p className="text-[#6B7280] text-sm text-center py-4">No urgent picks right now</p>
                        ) : (
                            <div className="space-y-3">
                                {topPicks.map((item, i) => (
                                    <div key={i} className="p-3 bg-[#1E2028] rounded-xl border-l-4 border-gold">
                                        <div className="flex justify-between items-start mb-2">
                                            <p className="text-white text-sm font-medium flex-1">{item.hotel}</p>
                                            {item.closesDays <= 1 && <span className="text-red-400 text-xs font-bold">URGENT</span>}
                                        </div>
                                        <div className="flex justify-between items-center">
                                            <span className="text-gold font-mono text-sm font-bold">{item.total}</span>
                                            <button 
                                                type="button"
                                                onClick={() => onApply(item)}
                                                className="text-xs bg-[#D4AF37] text-dark px-3 py-1 rounded-lg font-bold"
                                            >
                                                Apply
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    <Pipeline />
                    
                    <Checklist />

                    <div className="glass-card rounded-2xl p-5 text-center">
                        <p className="text-[#6B7280] text-xs">
                            Data refreshed {formatLastUpdated(lastRefreshed)}
                        </p>
                        <p className="text-[#4B5563] text-xs mt-1">
                            Auto-refreshes every 6 hours via GitHub Actions
                        </p>
                    </div>
                </aside>
            );
        }

        const checklistItems = [
            "Sign up at floorwalk.in with full name & valid PAN",
            "Set home city to Pune for geo-prioritised assignments",
            "Upload professional headshot — clean, well-lit, formal attire",
            "Complete demographic profile: age 28-50, income > ₹15 LPA",
            "Mark availability calendar 30 days ahead",
            "Pass FloorWalk's hotel-audit certification quiz (90% pass mark)",
            "Maintain 4.5+ rating across first 5 audits"
        ];

        function Pipeline() {
            return (
                <div className="glass-card rounded-2xl p-5">
                    <h4 className="font-display text-lg font-semibold text-white mb-4">
                        My Applications
                    </h4>
                    <div className="grid grid-cols-5 gap-2 text-center">
                        {['Saved','Applied','Short','Done','Paid'].map((stage, i) => (
                            <div key={stage} className="bg-[#1E2028] rounded-lg p-2">
                                <p className="text-[#8B8B8B] text-xs">{stage}</p>
                                <p className="text-white font-bold text-lg">0</p>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function Checklist() {
            const [checked, setChecked] = useState(() => {
                const saved = localStorage.getItem('luxeChecklistPune');
                return saved ? JSON.parse(saved) : Array(checklistItems.length).fill(false);
            });
            
            const toggleCheck = (index) => {
                const newChecked = [...checked];
                newChecked[index] = !newChecked[index];
                setChecked(newChecked);
                localStorage.setItem('luxeChecklistPune', JSON.stringify(newChecked));
            };
            
            const done = checked.filter(c => c).length;
            
            return (
                <div className="glass-card rounded-2xl p-5">
                    <div className="flex justify-between items-center mb-4">
                        <h4 className="font-display text-lg font-semibold text-white">Profile Setup</h4>
                        <span className="text-[#10B981] text-sm font-bold">{done}/{checklistItems.length}</span>
                    </div>
                    <ul className="space-y-3">
                        {checklistItems.map((item, index) => (
                            <li key={index} className="flex items-start gap-3 py-2">
                                <input 
                                    type="checkbox" 
                                    checked={checked[index]}
                                    onChange={() => toggleCheck(index)}
                                    className="mt-1 w-4 h-4 accent-[#2D6A4F] cursor-pointer"
                                />
                                <span className={`text-sm ${checked[index] ? 'text-[#6B6B6B] line-through' : 'text-[#B8B6B2]'}`}>
                                    {item}
                                </span>
                            </li>
                        ))}
                    </ul>
                </div>
            );
        }

        function App() {
            const [opportunities, setOpportunities] = useState([]);
            const [lastRefreshed, setLastRefreshed] = useState(DEFAULT_REFRESHED);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [tick, setTick] = useState(0);

            useEffect(() => {
                let cancelled = false;
                async function load() {
                    try {
                        const res = await fetch('./data/offers.json?_=' + Date.now());
                        if (!res.ok) throw new Error('Fetch failed');
                        const data = await res.json();
                        if (!cancelled) {
                            const enhanced = enhanceOpportunities(data.opportunities || []);
                            setOpportunities(enhanced);
                            if (data.lastRefreshed) setLastRefreshed(data.lastRefreshed);
                            setLoading(false);
                        }
                    } catch (err) {
                        if (!cancelled) {
                            console.warn('Failed to fetch offers.json, using fallback');
                            setError('Using cached offers');
                            setLoading(false);
                        }
                    }
                }
                load();
                return () => { cancelled = true; };
            }, []);

            useEffect(() => {
                const timer = setInterval(() => {
                    setOpportunities(prev => enhanceOpportunities(
                        prev.map(({ _closesInfo, ...o }) => o)
                    ));
                    setTick(t => t + 1);
                }, 30000);
                return () => clearInterval(timer);
            }, []);

            const handleApply = useCallback((assignment) => {
                const url = platformUrls[assignment.platform];
                if (url) {
                    window.open(url, '_blank');
                }
            }, []);

            const activeCount = opportunities.length;
            const totalValue = opportunities.reduce((s, a) => s + parseFloat(a.reimburse.replace(/[₹,]/g, '')), 0);
            
            return (
                <div className="max-w-7xl mx-auto px-4 py-8">
                    <Header 
                        opportunities={opportunities} 
                        lastRefreshed={lastRefreshed}
                        activeCount={activeCount}
                        totalValue={totalValue}
                    />
                    <StatsRow opportunities={opportunities} />
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div className="lg:col-span-2">
                            {loading ? (
                                <div className="glass-card rounded-2xl p-12 text-center">
                                    <div className="animate-pulse flex flex-col items-center gap-4">
                                        <div className="w-12 h-12 border-4 border-gold border-t-transparent rounded-full animate-spin"></div>
                                        <p className="text-[#8B8B8B]">Loading latest offers...</p>
                                    </div>
                                </div>
                            ) : (
                                <AssignmentsList opportunities={opportunities} onApply={handleApply} />
                            )}
                        </div>
                        <div className="lg:col-span-1">
                            <Sidebar opportunities={opportunities} onApply={handleApply} lastRefreshed={lastRefreshed} />
                        </div>
                    </div>
                    {error && (
                        <div className="mt-6 text-center">
                            <p className="text-[#6B7280] text-xs">{error} — edit data/offers.json to update</p>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
